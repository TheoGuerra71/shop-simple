<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meu PDV - Theo Guerra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        // 🛡️ SEGURANÇA: Bloqueio imediato se não houver Token de Login
        if (!localStorage.getItem('token')) {
            window.location.href = '/login.html';
        }

        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 500: '#10b981', 600: '#059669' } // Verde das fotos
                    }
                }
            }
        }

        // 🧠 FUNÇÃO GLOBAL: Faz requisições enviando o Token JWT automaticamente
        async function apiFetch(url, options = {}) {
            const token = localStorage.getItem('token');
            const res = await fetch(url, {
                ...options,
                headers: { 
                    ...options.headers, 
                    'Authorization': token, 
                    'Content-Type': 'application/json' 
                }
            });
            // Se o servidor disser que o token expirou (401), desloga na hora
            if (res.status === 401) {
                localStorage.removeItem('token');
                window.location.href = '/login.html';
            }
            return res;
        }
    </script>
    <style>
        /* Estilo para esconder scroll e fixar navegação */
        ::-webkit-scrollbar { display: none; }
        body { -webkit-tap-highlight-color: transparent; scrollbar-width: none; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans pb-24">

    <header class="bg-white px-6 pt-6 pb-4 flex justify-between items-center border-b border-gray-100 sticky top-0 z-40">
        <div>
            <h1 class="text-[10px] font-black text-brand-500 uppercase tracking-[0.2em]">Painel Admin</h1>
            <h2 id="page-title" class="text-2xl font-black text-gray-800">Caixa do Dia</h2>
        </div>
        <button onclick="logout()" class="text-gray-400 hover:text-red-500 transition-colors">
            <i class="ph ph-sign-out text-2xl"></i>
        </button>
    </header>

    <main class="px-6 py-4">

        <section id="aba-caixa" class="tab-content active space-y-6">
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Dashboard de Hoje</p>
            
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-white p-4 rounded-3xl shadow-sm border border-gray-100">
                    <i class="ph ph-trend-up text-brand-500 bg-emerald-50 p-2 rounded-xl mb-3 block w-fit"></i>
                    <span class="text-[10px] font-bold text-gray-400 uppercase">Vendas Hoje</span>
                    <p class="text-lg font-black mt-1">R$ <span id="dash-vendas-hoje">0,00</span></p>
                </div>
                <div class="bg-white p-4 rounded-3xl shadow-sm border border-gray-100">
                    <i class="ph ph-calendar text-blue-500 bg-blue-50 p-2 rounded-xl mb-3 block w-fit"></i>
                    <span class="text-[10px] font-bold text-gray-400 uppercase">Vendas no Mês</span>
                    <p class="text-lg font-black mt-1">R$ <span id="dash-vendas-mes">0,00</span></p>
                </div>
                <div class="bg-white p-4 rounded-3xl shadow-sm border border-gray-100">
                    <i class="ph ph-ticket text-orange-500 bg-orange-50 p-2 rounded-xl mb-3 block w-fit"></i>
                    <span class="text-[10px] font-bold text-gray-400 uppercase">Ticket Médio</span>
                    <p class="text-lg font-black mt-1">R$ <span id="dash-ticket">0,00</span></p>
                </div>
                <div class="bg-white p-4 rounded-3xl shadow-sm border border-gray-100">
                    <i class="ph ph-package text-gray-400 bg-gray-50 p-2 rounded-xl mb-3 block w-fit"></i>
                    <span class="text-[10px] font-bold text-gray-400 uppercase">Itens Estoque</span>
                    <p class="text-lg font-black mt-1"><span id="dash-estoque-total">0</span></p>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-2">
                <div class="bg-white p-3 rounded-2xl text-center shadow-sm border border-gray-100">
                    <span class="text-[8px] font-bold text-gray-400 uppercase">Entradas</span>
                    <p class="text-xs font-black text-brand-500 mt-1">R$ <span id="dash-entradas">0,00</span></p>
                </div>
                <div class="bg-white p-3 rounded-2xl text-center shadow-sm border border-gray-100">
                    <span class="text-[8px] font-bold text-gray-400 uppercase">Saídas</span>
                    <p class="text-xs font-black text-red-500 mt-1">R$ <span id="dash-saidas">0,00</span></p>
                </div>
                <div class="bg-white p-3 rounded-2xl text-center shadow-sm border border-gray-100">
                    <span class="text-[8px] font-bold text-gray-400 uppercase">Lucro</span>
                    <p class="text-xs font-black text-emerald-700 mt-1">R$ <span id="dash-lucro">0,00</span></p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 py-2">
                <button onclick="abrirModalVenda()" class="bg-brand-500 text-white py-4 rounded-2xl font-black shadow-lg shadow-emerald-100 active:scale-95 transition-all">
                    <i class="ph ph-plus-circle mr-2 text-xl"></i> + Entrada
                </button>
                <button onclick="abrirModalSaida()" class="bg-white text-red-500 border-2 border-red-50 py-4 rounded-2xl font-black active:scale-95 transition-all">
                    <i class="ph ph-minus-circle mr-2 text-xl"></i> - Saída
                </button>
            </div>

            <div>
                <p class="text-[10px] font-bold text-gray-400 uppercase mb-4 tracking-widest">Movimentações de Hoje</p>
                <div id="lista-movimentos" class="space-y-3">
                    </div>
            </div>
        </section>

        <section id="aba-estoque" class="tab-content space-y-4">
            <div class="flex justify-between items-center mb-2">
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Catálogo de Itens</p>
                <button onclick="alert('Funcionalidade de Novo Produto em breve!')" class="text-brand-500 font-bold text-xs">+ Novo Produto</button>
            </div>
            <div id="grid-estoque" class="grid grid-cols-1 gap-4">
                </div>
        </section>

        <section id="aba-repor" class="tab-content space-y-4">
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Atenção Necessária</p>
            <div id="lista-reposicao" class="space-y-3">
                </div>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 px-6 py-3 flex justify-between items-center shadow-[0_-5px_20px_rgba(0,0,0,0.05)] z-50">
        <button onclick="mudarAba('caixa', this)" class="nav-btn flex flex-col items-center text-brand-500">
            <i class="ph-fill ph-shopping-cart text-2xl transition-all"></i>
            <span class="text-[10px] font-bold mt-1">Caixa</span>
        </button>
        <button onclick="mudarAba('estoque', this)" class="nav-btn flex flex-col items-center text-gray-400">
            <i class="ph ph-package text-2xl transition-all"></i>
            <span class="text-[10px] font-bold mt-1">Estoque</span>
        </button>
        <button onclick="mudarAba('repor', this)" class="nav-btn flex flex-col items-center text-gray-400">
            <i class="ph ph-warning-octagon text-2xl transition-all"></i>
            <span class="text-[10px] font-bold mt-1">Repor</span>
        </button>
        <button onclick="window.location.href='/catalogo.html'" class="nav-btn flex flex-col items-center text-gray-400">
            <i class="ph ph-share-network text-2xl transition-all"></i>
            <span class="text-[10px] font-bold mt-1">Público</span>
        </button>
    </nav>

    <div id="modal-venda" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[60] flex items-end sm:items-center justify-center">
        <div class="bg-white w-full max-w-lg rounded-t-[2.5rem] sm:rounded-[2.5rem] p-8 shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-2xl font-black text-gray-800">Registrar Venda</h3>
                <button onclick="fecharModais()" class="bg-gray-100 p-2 rounded-full text-gray-400"><i class="ph ph-x"></i></button>
            </div>
            
            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase px-2 mb-2 block">Selecione o Item</label>
                    <select id="venda-produto-id" onchange="atualizarTotalVenda()" class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl font-bold outline-none appearance-none focus:border-brand-500">
                        </select>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase px-2 mb-2 block">Quantidade</label>
                        <input type="number" id="venda-qtd" value="1" min="1" oninput="atualizarTotalVenda()" class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl font-black outline-none focus:border-brand-500 text-center">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase px-2 mb-2 block text-center">Total</label>
                        <div class="w-full p-4 bg-emerald-50 text-brand-600 rounded-2xl font-black text-center border-2 border-emerald-100 text-xl">
                            R$ <span id="venda-total">0,00</span>
                        </div>
                    </div>
                </div>

                <button onclick="confirmarVenda()" class="w-full bg-brand-500 text-white py-5 rounded-2xl font-black text-lg shadow-xl shadow-emerald-100 active:scale-95 transition-all mt-4">Confirmar Venda</button>
            </div>
        </div>
    </div>

    <div id="modal-saida" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[60] flex items-end sm:items-center justify-center">
        <div class="bg-white w-full max-w-lg rounded-t-[2.5rem] sm:rounded-[2.5rem] p-8 shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-2xl font-black text-gray-800">Registrar Saída</h3>
                <button onclick="fecharModais()" class="bg-gray-100 p-2 rounded-full text-gray-400"><i class="ph ph-x"></i></button>
            </div>
            <div class="space-y-6">
                <input type="number" id="saida-valor" placeholder="Valor (R$)" class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl font-black outline-none focus:border-red-500">
                <input type="text" id="saida-desc" placeholder="Descrição (Ex: Luz, Aluguel...)" class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl font-bold outline-none focus:border-red-500">
                <button onclick="confirmarSaida()" class="w-full bg-red-500 text-white py-5 rounded-2xl font-black text-lg shadow-xl shadow-red-100 active:scale-95 transition-all mt-4">Confirmar Saída</button>
            </div>
        </div>
    </div>

    <script>
        let produtosCached = [];

        // --- NAVEGAÇÃO ---
        function mudarAba(aba, btn) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(`aba-${aba}`).classList.add('active');
            
            document.querySelectorAll('.nav-btn').forEach(b => {
                b.classList.remove('text-brand-500'); b.classList.add('text-gray-400');
                b.querySelector('i').classList.replace('ph-fill', 'ph');
            });

            btn.classList.add('text-brand-500'); btn.classList.remove('text-gray-400');
            btn.querySelector('i').classList.replace('ph', 'ph-fill');

            const titulos = { caixa: 'Caixa do Dia', estoque: 'Estoque', repor: 'Reposição' };
            document.getElementById('page-title').innerText = titulos[aba];
            
            if (aba === 'caixa') { carregarDash(); carregarMovimentos(); }
            if (aba === 'estoque' || aba === 'repor') carregarEstoque();
        }

        // --- API CALLS ---
        async function carregarDash() {
            const res = await apiFetch('/api/dashboard');
            const d = await res.json();
            document.getElementById('dash-vendas-hoje').innerText = d.vendas_hoje.toFixed(2);
            document.getElementById('dash-vendas-mes').innerText = d.vendas_mes.toFixed(2);
            document.getElementById('dash-ticket').innerText = d.ticket_medio.toFixed(2);
            document.getElementById('dash-estoque-total').innerText = d.itens_estoque;
            document.getElementById('dash-entradas').innerText = d.total_entradas.toFixed(2);
            document.getElementById('dash-saidas').innerText = d.total_saidas.toFixed(2);
            document.getElementById('dash-lucro').innerText = d.lucro_liquido.toFixed(2);
        }

        async function carregarMovimentos() {
            const res = await apiFetch('/api/movimentos');
            const movs = await res.json();
            const container = document.getElementById('lista-movimentos');
            container.innerHTML = '';
            movs.forEach(m => {
                const isE = m.tipo === 'ENTRADA';
                container.innerHTML += `
                <div class="bg-white p-4 rounded-3xl shadow-sm border border-gray-50 flex justify-between items-center">
                    <div class="flex items-center">
                        <div class="p-2 rounded-2xl mr-3 ${isE ? 'bg-emerald-50 text-brand-500' : 'bg-red-50 text-red-500'}">
                            <i class="ph ph-${isE ? 'arrow-up-right' : 'arrow-down-left'} text-xl font-bold"></i>
                        </div>
                        <div>
                            <p class="text-sm font-black text-gray-800">${m.descricao}</p>
                            <p class="text-[10px] text-gray-400 font-bold uppercase">${m.data_mov.split('T')[1].substring(0,5)}</p>
                        </div>
                    </div>
                    <p class="font-black ${isE ? 'text-brand-500' : 'text-red-500'} text-sm">${isE ? '+' : '-'} R$ ${m.valor.toFixed(2)}</p>
                </div>`;
            });
        }

        async function carregarEstoque() {
            const res = await apiFetch('/api/produtos');
            produtosCached = await res.json();
            
            const grid = document.getElementById('grid-estoque');
            const repor = document.getElementById('lista-reposicao');
            const select = document.getElementById('venda-produto-id');
            
            grid.innerHTML = ''; repor.innerHTML = ''; 
            select.innerHTML = '<option value="">Selecione um produto...</option>';

            produtosCached.forEach(p => {
                const baixo = p.quantidade <= p.estoque_minimo;
                
                // ABA ESTOQUE
                grid.innerHTML += `
                <div class="bg-white rounded-[2rem] p-5 shadow-sm border border-gray-100 flex gap-5">
                    <div class="w-20 h-20 bg-gray-50 rounded-2xl flex items-center justify-center text-gray-300">
                        <i class="ph ph-package text-4xl"></i>
                    </div>
                    <div class="flex-1">
                        <div class="flex justify-between items-start">
                            <h4 class="font-black text-gray-800">${p.nome}</h4>
                            ${baixo ? '<span class="bg-orange-100 text-orange-600 text-[8px] font-black px-2 py-1 rounded-full">REPOR</span>' : ''}
                        </div>
                        <p class="text-brand-500 font-black text-lg">R$ ${p.preco.toFixed(2)}</p>
                        <div class="flex justify-between items-center mt-2">
                            <span class="text-[10px] text-gray-400 font-bold uppercase">${p.quantidade} un disponíveis</span>
                            <i class="ph ph-pencil-simple text-gray-300"></i>
                        </div>
                    </div>
                </div>`;

                // ABA REPOSIÇÃO
                if (baixo) {
                    repor.innerHTML += `
                    <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 flex justify-between items-center">
                        <div class="flex items-center">
                            <div class="w-10 h-10 bg-orange-50 text-orange-500 rounded-full flex items-center justify-center mr-4">
                                <i class="ph ph-warning-circle text-xl"></i>
                            </div>
                            <div>
                                <p class="font-black text-gray-800">${p.nome}</p>
                                <p class="text-[10px] text-gray-400 font-bold uppercase">Restam apenas ${p.quantidade}</p>
                            </div>
                        </div>
                        <p class="text-red-500 font-black text-xs">Mín: ${p.estoque_minimo}</p>
                    </div>`;
                }

                // SELECT MODAL
                select.innerHTML += `<option value="${p.id}">${p.nome} (R$ ${p.preco.toFixed(2)})</option>`;
            });
        }

        // --- LÓGICA MODAIS ---
        function abrirModalVenda() { document.getElementById('modal-venda').classList.remove('hidden'); carregarEstoque(); }
        function abrirModalSaida() { document.getElementById('modal-saida').classList.remove('hidden'); }
        function fecharModais() { document.querySelectorAll('.fixed.inset-0').forEach(m => m.classList.add('hidden')); }

        function atualizarTotalVenda() {
            const id = document.getElementById('venda-produto-id').value;
            const qtd = parseInt(document.getElementById('venda-qtd').value) || 0;
            const p = produtosCached.find(prod => prod.id == id);
            document.getElementById('venda-total').innerText = p ? (p.preco * qtd).toFixed(2) : "0,00";
        }

        async function confirmarVenda() {
            const id = parseInt(document.getElementById('venda-produto-id').value);
            const qtd = parseInt(document.getElementById('venda-qtd').value);
            if (!id || !qtd) return;

            const res = await apiFetch('/api/vender', {
                method: 'POST',
                body: JSON.stringify({ id, quantidade: qtd })
            });

            if (res.ok) { fecharModais(); carregarDash(); carregarMovimentos(); }
            else { alert("Erro na venda. Verifique o estoque!"); }
        }

        async function confirmarSaida() {
            const valor = parseFloat(document.getElementById('saida-valor').value);
            const desc = document.getElementById('saida-desc').value;
            if (!valor || !desc) return;

            await apiFetch('/caixa/movimento', {
                method: 'POST',
                body: JSON.stringify({ tipo: 'SAIDA', descricao: desc, valor: valor })
            });
            fecharModais(); carregarDash(); carregarMovimentos();
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/login.html';
        }

        // START
        carregarDash();
        carregarMovimentos();
    </script>
</body>
</html>
