<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="bg-gray-50 pb-10">

    <header class="bg-white p-6 text-center shadow-sm">
        <h1 id="store-name" class="text-2xl font-black text-gray-800 uppercase">Minha Loja</h1>
        <p class="text-gray-400 text-sm">Escolha seus produtos e peça pelo WhatsApp</p>
    </header>

    <main class="p-6 max-w-lg mx-auto space-y-4" id="lista-catalogo">
        </main>

    <script>
        async function carregarCatalogo() {
            // Puxa as configs da loja (pra saber o WhatsApp)
            const resLoja = await fetch('/loja/config');
            const loja = await resLoja.json();
            document.getElementById('store-name').innerText = loja.nome_loja;

            // Puxa os produtos
            const resProd = await fetch('/api/catalogo');
            const produtos = await resProd.json();
            const container = document.getElementById('lista-catalogo');

            produtos.forEach(p => {
                const msg = encodeURIComponent(`Olá! Gostaria de encomendar: ${p.nome}`);
                const linkWhats = `https://wa.me/${loja.whatsapp}?text=${msg}`;

                container.innerHTML += `
                <div class="bg-white rounded-3xl p-4 shadow-sm border border-gray-100 flex items-center gap-4">
                    <div class="w-20 h-20 bg-gray-50 rounded-2xl flex items-center justify-center text-gray-300">
                        <i class="ph ph-package text-3xl"></i>
                    </div>
                    <div class="flex-1">
                        <h4 class="font-black text-gray-800">${p.nome}</h4>
                        <p class="text-emerald-500 font-black">R$ ${p.preco.toFixed(2)}</p>
                        <a href="${linkWhats}" target="_blank" class="mt-2 inline-flex items-center text-xs font-bold text-white bg-emerald-500 px-4 py-2 rounded-full shadow-md active:scale-95 transition-transform">
                            <i class="ph ph-whatsapp-logo mr-1 text-lg"></i> Pedir agora
                        </a>
                    </div>
                </div>`;
            });
        }
        carregarCatalogo();
    </script>
</body>
</html>
