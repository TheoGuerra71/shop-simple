<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catálogo Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,800;1,400&family=Inter:wght@300;400;600&display=swap');
        
        :root { --tema-loja: #1c1917; } /* Cor dinâmica substituída pelo JS */
        
        body { font-family: 'Inter', sans-serif; background-color: #faf9f6; color: #1c1917; -webkit-tap-highlight-color: transparent; }
        h1, h2, h3, .serif { font-family: 'Playfair Display', serif; }
        
        ::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        
        .produto-img { object-fit: cover; width: 100%; height: 380px; background-color: #f5f5f4; border-radius: 1.5rem; }
        
        .btn-tema { background-color: var(--tema-loja); color: white; transition: transform 0.2s; }
        .btn-tema:active { transform: scale(0.98); }
        .text-tema { color: var(--tema-loja); }
        .border-tema { border-color: var(--tema-loja); }
    </style>
</head>
<body class="pb-28">

    <header class="py-8 px-6 text-center sticky top-0 z-40 bg-[#faf9f6]/95 backdrop-blur-md border-b border-stone-200">
        <h1 id="store-name" class="text-3xl font-serif font-bold text-stone-900 tracking-tight mb-2">Sua Marca</h1>
        <div class="flex items-center justify-center gap-4 text-stone-500">
            <a id="link-insta" href="#" target="_blank" class="hidden flex items-center justify-center gap-1 text-[10px] font-bold uppercase tracking-widest hover:text-stone-900 transition-colors">
                <i class="ph-fill ph-instagram-logo text-lg"></i> <span id="txt-insta">Instagram</span>
            </a>
        </div>
    </header>

    <main class="max-w-md mx-auto w-full pt-6 px-5 relative z-10">
        
        <div class="flex gap-2 overflow-x-auto hide-scroll pb-6" id="filtro-categorias">
            <p class="text-xs text-stone-400 animate-pulse">Carregando vitrine...</p>
        </div>

        <div id="grid-produtos" class="grid grid-cols-1 gap-10"></div>
    </main>

    <div id="barra-carrinho" class="fixed bottom-0 left-0 right-0 bg-white border-t border-stone-200 p-5 transform translate-y-full transition-transform duration-300 z-50 shadow-[0_-10px_40px_rgba(0,0,0,0.05)]">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <p class="text-[10px] font-bold text-stone-400 uppercase tracking-widest mb-1">Sua Sacola</p>
                <p class="text-xl font-serif text-stone-900"><span id="qtd-sacola">0</span> itens <span class="text-sm font-sans font-bold text-stone-500 ml-1">(R$ <span id="total-sacola">0,00</span>)</span></p>
            </div>
            <button onclick="enviarPedido()" class="btn-tema px-6 py-4 rounded-full font-bold shadow-lg flex items-center gap-2">
                Pedir via Whats <i class="ph-fill ph-whatsapp-logo text-xl"></i>
            </button>
        </div>
    </div>

    <footer class="text-center py-12 px-6 text-stone-400">
        <p class="serif italic text-lg mb-2" id="msg-suporte">Feito com carinho para você.</p>
        <p class="text-[10px] uppercase tracking-widest font-bold">© <span id="ano-footer">2026</span></p>
    </footer>

    <script>
        let loja = {};
        let produtos = [];
        let carrinho = [];

        async function initLoja() {
            document.getElementById('ano-footer').innerText = new Date().getFullYear();

            // 1. Busca configs (Público)
            try {
                const resLoja = await fetch('/api/loja');
                if(resLoja.ok) {
                    loja = await resLoja.json();
                    document.getElementById('store-name').innerText = loja.nome_loja || "Boutique";
                    if(loja.msg_suporte) document.getElementById('msg-suporte').innerText = loja.msg_suporte;
                    
                    // Injeta a cor da loja no CSS
                    if(loja.cor_hex) { document.documentElement.style.setProperty('--tema-loja', loja.cor_hex); }

                    if(loja.instagram) {
                        const btnInsta = document.getElementById('link-insta');
                        btnInsta.classList.remove('hidden');
                        btnInsta.href = `https://instagram.com/${loja.instagram.replace('@','')}`;
                        document.getElementById('txt-insta').innerText = loja.instagram;
                    }
                }
            } catch(e) { console.error("Erro ao carregar loja", e); }

            // 2. Busca Produtos (Público)
            try {
                const resProd = await fetch('/api/produtos');
                if(resProd.ok) {
                    const todos = await resProd.json();
                    // O SEGREDO: Filtra apenas produtos com estoque > 0
                    produtos = todos.filter(p => p.quantidade > 0);
                    renderizarCategorias();
                    renderizarProdutos('Todos');
                } else {
                    document.getElementById('filtro-categorias').innerHTML = "<p class='text-sm text-red-500'>Erro ao carregar produtos.</p>";
                }
            } catch(e) { console.error("Erro", e); }
        }

        function renderizarCategorias() {
            const catContainer = document.getElementById('filtro-categorias');
            const categorias = ['Todos', ...new Set(produtos.map(p => p.categoria || 'Geral'))];
            
            catContainer.innerHTML = '';
            categorias.forEach(cat => {
                catContainer.innerHTML += `
                <button onclick="renderizarProdutos('${cat}')" class="flex-shrink-0 px-6 py-2.5 rounded-full border border-stone-300 text-[10px] uppercase tracking-widest font-bold text-stone-500 transition-colors focus:bg-stone-900 focus:text-white focus:border-stone-900 active:scale-95">
                    ${cat}
                </button>`;
            });
        }

        function renderizarProdutos(filtroCat) {
            const grid = document.getElementById('grid-produtos');
            grid.innerHTML = '';
            
            const exibicao = filtroCat === 'Todos' ? produtos : produtos.filter(p => (p.categoria || 'Geral') === filtroCat);

            if(exibicao.length === 0) {
                grid.innerHTML = `<div class="text-center py-10"><i class="ph ph-package text-5xl text-stone-300 mb-2"></i><p class="text-sm text-stone-500 font-medium">Nenhum item nesta coleção.</p></div>`;
                return;
            }

            exibicao.forEach(p => {
                // Se o lojista subiu imagem, usa a base64. Se não, exibe placeholder elegante.
                let htmlImg = `<div class="w-full h-[350px] bg-stone-100 rounded-3xl mb-4 flex flex-col items-center justify-center text-stone-300"><i class="ph ph-image text-5xl mb-2"></i><span class="text-xs font-bold uppercase tracking-widest">Sem Foto</span></div>`;
                if(p.url_imagem && p.url_imagem.length > 10) {
                    htmlImg = `<img src="${p.url_imagem}" class="produto-img shadow-sm mb-4">`;
                }

                grid.innerHTML += `
                <div class="group">
                    <div class="relative">
                        ${htmlImg}
                        <button onclick="addCarrinho(${p.id}, '${p.nome}', ${p.preco}, event)" class="absolute bottom-8 right-4 btn-tema w-14 h-14 rounded-full shadow-xl flex items-center justify-center hover:scale-105 transition-transform z-10">
                            <i class="ph-fill ph-bag text-2xl"></i>
                        </button>
                    </div>
                    <div class="flex justify-between items-start px-2">
                        <div>
                            <p class="text-[10px] text-stone-400 font-bold uppercase tracking-widest mb-1">${p.categoria || 'Geral'}</p>
                            <h3 class="font-serif text-2xl text-stone-900 leading-tight">${p.nome}</h3>
                        </div>
                        <p class="font-sans font-bold text-stone-900 mt-1">R$ ${p.preco.toFixed(2)}</p>
                    </div>
                </div>`;
            });
        }

        function addCarrinho(id, nome, preco, event) {
            const item = carrinho.find(i => i.id === id);
            if(item) { item.qtd++; } else { carrinho.push({ id, nome, preco, qtd: 1 }); }
            atualizarBarra();
            
            // Animação de sucesso no botão
            const btn = event.currentTarget;
            const iconOriginal = btn.innerHTML;
            btn.innerHTML = '<i class="ph-bold ph-check text-2xl"></i>';
            btn.classList.add('bg-stone-900');
            setTimeout(() => { btn.innerHTML = iconOriginal; btn.classList.remove('bg-stone-900'); }, 800);
        }

        function atualizarBarra() {
            const barra = document.getElementById('barra-carrinho');
            if(carrinho.length === 0) {
                barra.classList.add('translate-y-full');
                return;
            }
            
            barra.classList.remove('translate-y-full');
            
            let totalQtd = 0; let totalValor = 0;
            carrinho.forEach(i => { totalQtd += i.qtd; totalValor += (i.preco * i.qtd); });
            
            document.getElementById('qtd-sacola').innerText = totalQtd;
            document.getElementById('total-sacola').innerText = totalValor.toFixed(2);
        }

        function enviarPedido() {
            if(!loja.whatsapp) return alert("Esta loja ainda não habilitou vendas pelo WhatsApp.");
            
            let texto = `Olá! Gostaria de fazer o seguinte pedido na vitrine online:\n\n`;
            let total = 0;
            
            carrinho.forEach(i => {
                texto += `🛍️ ${i.qtd}x ${i.nome} - R$ ${(i.preco * i.qtd).toFixed(2)}\n`;
                total += (i.preco * i.qtd);
            });
            
            texto += `\n💰 *Total da Sacola: R$ ${total.toFixed(2)}*\n\nComo faço o pagamento?`;
            
            const numZap = loja.whatsapp.replace(/\D/g, '');
            window.open(`https://wa.me/55${numZap}?text=${encodeURIComponent(texto)}`, '_blank');
        }

        initLoja();
    </script>
</body>
</html>
